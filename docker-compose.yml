version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: verbis-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=verbis

  postgres:
    image: postgres:latest
    container_name: verbis-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=verbis

volumes:
  mongodb_data:
  postgres_data:
